<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="64" cy="64" r="60" fill="url(#gradient)" />
  
  <!-- 代码括号符号 -->
  <g fill="white" stroke="white" stroke-width="2">
    <!-- 左括号 -->
    <path d="M48,50 C42,58 42,70 48,78" fill="none" stroke-width="6" stroke-linecap="round" />
    <!-- 右括号 -->
    <path d="M80,50 C86,58 86,70 80,78" fill="none" stroke-width="6" stroke-linecap="round" />
    <!-- 中间的线（代表Line） -->
    <line x1="60" y1="64" x2="68" y2="64" stroke-width="4" stroke-linecap="round" />
    <line x1="64" y1="60" x2="64" y2="68" stroke-width="4" stroke-linecap="round" />
  </g>
  
  <!-- 外圈装饰 -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.3" />
</svg>