name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests on'
        required: false
        default: 'production'
        type: choice
        options:
        - production
        - staging
        - development

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
      
    - name: Verify clean test environment
      shell: bash
      run: |
        echo "=== 环境验证开始 ==="
        echo "工作目录: $(pwd)"
        echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
        echo "当前目录内容:"
        ls -la | head -20
        
        # 检查是否有openclaw残留文件
        if [ -d "openclaw" ] || [ -f "openclaw" ]; then
          echo "⚠️  发现可能的openclaw残留文件，正在清理..."
          rm -rf openclaw 2>/dev/null || true
        fi
        
        # 验证codeline项目结构
        if [ ! -f "package.json" ]; then
          echo "❌ 错误：package.json不存在，环境可能有问题"
          exit 1
        fi
        
        echo "✅ 环境验证通过"
      
    - name: Compile TypeScript
      run: npm run compile
      
    - name: Compile test files
      run: npm run compile:tests
      
    - name: Debug - Check compiled test structure
      shell: bash
      run: |
        echo "=== 检查编译后的测试文件结构 ==="
        echo "out目录内容:"
        find out -type f -name "*.js" | head -30
        echo ""
        echo "out/test目录内容:"
        find out/test -type f -name "*.js" 2>/dev/null | head -30 || echo "out/test目录不存在"
        echo ""
        echo "mockVscode文件状态:"
        if [ -f "out/test/helpers/mockVscode.js" ]; then
          echo "✅ mockVscode.js存在，大小: $(wc -l < out/test/helpers/mockVscode.js) 行"
          head -5 out/test/helpers/mockVscode.js
        else
          echo "❌ mockVscode.js不存在"
          echo "查找mockVscode文件:"
          find . -name "mockVscode.js" 2>/dev/null
        fi
      
    - name: Run unit tests
      run: |
        echo "=== 运行单元测试 ==="
        npm run test:unit 2>&1 | tee unit-test-output.log
        UNIT_EXIT_CODE=${PIPESTATUS[0]}
        echo "单元测试退出码: $UNIT_EXIT_CODE"
        if [ $UNIT_EXIT_CODE -ne 0 ]; then
          echo "⚠️  单元测试失败，显示错误:"
          cat unit-test-output.log | tail -50
        fi
        exit $UNIT_EXIT_CODE
      
    - name: Run integration tests  
      run: |
        echo "=== 运行集成测试 ==="
        npm run test:integration 2>&1 | tee integration-test-output.log
        INTEGRATION_EXIT_CODE=${PIPESTATUS[0]}
        echo "集成测试退出码: $INTEGRATION_EXIT_CODE"
        if [ $INTEGRATION_EXIT_CODE -ne 0 ]; then
          echo "⚠️  集成测试失败，显示错误:"
          cat integration-test-output.log | tail -50
        fi
        exit $INTEGRATION_EXIT_CODE
      
    - name: Check code formatting
      run: |
        npx prettier --check "src/**/*.ts" "src/**/*.js" || echo "Formatting issues found"
        
    - name: Build extension package
      run: npm run package
      
    - name: Upload extension artifact
      if: matrix.node-version == '22.x'
      uses: actions/upload-artifact@v4
      with:
        name: codeline-extension
        path: codeline-*.vsix
        
  e2e-test:
    runs-on: ubuntu-latest
    needs: test
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Use Node.js 22.x
      uses: actions/setup-node@v5
      with:
        node-version: '22.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
      
    - name: Setup Xvfb for display server
      run: |
        Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
        sleep 3
        
    - name: Run VS Code extension tests
      run: |
        DISPLAY=:99 npm run test:e2e || echo "E2E tests skipped or failed - this is expected in CI environment"
        
  security-scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Run npm audit
      run: npm audit --audit-level=moderate || true
      
    - name: Check for vulnerable dependencies
      run: |
        npm ls --all --prod 2>/dev/null | grep -E "(✗|WARN)" || echo "No vulnerable dependencies found"