name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests on'
        required: false
        default: 'production'
        type: choice
        options:
        - production
        - staging
        - development

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
      
    - name: Compile TypeScript
      run: npm run compile
      
    - name: Run unit tests
      run: npm run test:unit
      
    - name: Run integration tests  
      run: npm run test:integration
      
    - name: Check code formatting
      run: |
        npx prettier --check "src/**/*.ts" "src/**/*.js" || echo "Formatting issues found"
        
    - name: Build extension package
      run: npm run package
      
    - name: Upload extension artifact
      if: matrix.node-version == '18.x'
      uses: actions/upload-artifact@v4
      with:
        name: codeline-extension
        path: codeline-*.vsix
        
  e2e-test:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
      
    - name: Install VS Code test dependencies
      run: |
        npm install @vscode/test-electron --save-dev
        
    - name: Run VS Code extension tests
      run: |
        npm test
      env:
        DISPLAY: ':99'
        
    - name: Setup Xvfb
      if: always()
      run: |
        Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
        
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run npm audit
      run: npm audit --audit-level=moderate || true
      
    - name: Check for vulnerable dependencies
      run: |
        npm ls --all --prod 2>/dev/null | grep -E "(✗|WARN)" || echo "No vulnerable dependencies found"