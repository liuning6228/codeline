<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- 单色图标：使用黑色，VS Code会根据主题着色 -->
  <!-- 圆形背景（透明） -->
  
  <!-- 代码括号符号 -->
  <g fill="currentColor" stroke="currentColor" stroke-width="2">
    <!-- 左括号 -->
    <path d="M44,48 C38,56 38,72 44,80" fill="none" stroke-width="8" stroke-linecap="round" opacity="0.9" />
    <!-- 右括号 -->
    <path d="M84,48 C90,56 90,72 84,80" fill="none" stroke-width="8" stroke-linecap="round" opacity="0.9" />
    <!-- 加号（代表连接/扩展） -->
    <rect x="60" y="60" width="8" height="8" rx="2" />
    <rect x="62" y="56" width="4" height="16" rx="1" />
    <rect x="56" y="62" width="16" height="4" rx="1" />
  </g>
</svg>